<div class="container py-4">
  <h2 class="h5">Lock Access</h2>

  <div *ngIf="error()" class="alert alert-danger">{{ error() }}</div>

  <div *ngIf="!error()">
    <div class="mb-3" *ngIf="validTo()">
      <span class="badge text-bg-secondary">Restzeit: {{ getRemainingLabel() }}</span>
    </div>

    <div *ngIf="!locks(); else listTpl" class="text-muted">Lade …</div>
    <ng-template #listTpl>
      <div class="row g-3">
        <div class="col-12 col-md-6 col-lg-4" *ngFor="let l of locks()!">
          <div class="card h-100">
            <div class="card-body d-flex flex-column">
              <div class="d-flex justify-content-between align-items-center mb-2">
                <div class="fw-semibold">{{ l.name }}</div>
                <span *ngIf="l.state" class="badge" [class.text-bg-success]="l.state==='OPEN'" [class.text-bg-secondary]="l.state==='CLOSED'" [class.text-bg-warning]="l.state==='UNKNOWN'">{{ l.state }}</span>
              </div>
              <button class="btn btn-primary mt-auto" [disabled]="busy()" (click)="open(l)">Zum Öffnen klicken</button>
            </div>
          </div>
        </div>
      </div>
    </ng-template>
  </div>

  <div class="mt-3">
    <a href="/" class="text-decoration-none">Zurück</a>
  </div>
</div>
