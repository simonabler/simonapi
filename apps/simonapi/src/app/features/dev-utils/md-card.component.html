<div class="card rounded-card h-100">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="d-flex align-items-center gap-2">
        <div class="d-inline-grid place-items-center bg-body-secondary rounded-3" style="width:36px;height:36px; position:relative">
          <lucide-icon class="lucide-center" [img]="FileTextIcon" [size]="20"></lucide-icon>
        </div>
        <div>
          <div class="fw-semibold">Markdown → HTML</div>
          <div class="text-body-secondary small">Server‑Rendered</div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-dark">utility</span>
      </div>
    </div>

    <div class="row g-2">
      <div class="col-12 col-lg-6">
        <textarea class="form-control" rows="8" [(ngModel)]="mdInput"></textarea>
      </div>
      <div class="col-12 col-lg-6">
        <div class="preview" [innerHTML]="mdHtml || ''"></div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" (click)="runMd()" [disabled]="mdLoading">{{mdLoading ? '...' : 'POST /api/utils/md2html'}}</button>
    </div>
  </div>
</div>
