<div class="card rounded-card h-100">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="d-flex align-items-center gap-2">
        <div class="d-inline-grid place-items-center bg-body-secondary rounded-3" style="width:36px;height:36px; position:relative">
          <lucide-icon class="lucide-center" [img]="HashIcon" [size]="20"></lucide-icon>
        </div>
        <div>
          <div class="fw-semibold">Hashing</div>
          <div class="text-body-secondary small">md5 / sha256 / bcrypt</div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-dark">utility</span>
      </div>
    </div>

    <div class="row g-2 align-items-center mb-2">
      <div class="col-12 col-sm-8">
        <input class="form-control form-control-sm" [(ngModel)]="hashInput" placeholder="Text zu hashen">
      </div>
      <div class="col-6 col-sm-4 d-flex align-items-center gap-2">
        <select class="form-select form-select-sm" [(ngModel)]="hashAlgo">
          <option>md5</option>
          <option>sha256</option>
          <option>bcrypt</option>
        </select>
      </div>
      <div>
        <button class="btn btn-secondary" (click)="runHash()" [disabled]="hashLoading">{{hashLoading ? '...' : 'POST /api/utils/hash'}}</button>
      </div>
    </div>
    <div *ngIf="hashResult">
      <div class="input-group input-group-sm">
        <input class="form-control" [value]="hashResult" readonly>
        <button class="btn btn-outline-secondary" (click)="copy(hashResult)">Copy</button>
      </div>
    </div>
  </div>
</div>
