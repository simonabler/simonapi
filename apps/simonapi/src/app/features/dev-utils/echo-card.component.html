<div class="card rounded-card h-100">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="d-flex align-items-center gap-2">
        <div class="d-inline-grid place-items-center bg-body-secondary rounded-3" style="width:36px;height:36px; position:relative">
          <lucide-icon class="lucide-center" [img]="TerminalIcon" [size]="20"></lucide-icon>
        </div>
        <div>
          <div class="fw-semibold">Echo / IP</div>
          <div class="text-body-secondary small">Client‑Info</div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-dark">utility</span>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-secondary" (click)="runEcho()" [disabled]="echoLoading">{{echoLoading ? '...' : 'GET /api/utils/echo'}}
      </button>
    </div>

    <pre class="code mt-2" *ngIf="echoResult as r"><code>{{ r | json }}</code></pre>
  </div>
</div>
