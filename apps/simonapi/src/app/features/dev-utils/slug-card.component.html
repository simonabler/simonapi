<div class="card rounded-card h-100">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <div class="d-flex align-items-center gap-2">
        <div class="d-inline-grid place-items-center bg-body-secondary rounded-3" style="width:36px;height:36px; position:relative">
          <lucide-icon class="lucide-center" [img]="TypeIcon" [size]="20"></lucide-icon>
        </div>
        <div>
          <div class="fw-semibold">Slugify / Transliteration</div>
          <div class="text-body-secondary small">Strings → Slug</div>
        </div>
      </div>
      <div class="d-flex align-items-center gap-2">
        <span class="badge text-bg-dark">utility</span>
      </div>
    </div>

    <div class="d-flex gap-2 mb-2">
      <input class="form-control form-control-sm" [(ngModel)]="slugInput" placeholder="Text for slug">
    </div>

    <div class="actions">
      <button class="btn btn-secondary" (click)="runSlug()" [disabled]="slugLoading">{{slugLoading ? '...' : 'POST /api/utils/slugify'}}</button>
    </div>

    <div class="mt-2" *ngIf="slugResult">
      <div class="input-group input-group-sm">
        <input class="form-control" [value]="slugResult" readonly>
        <button class="btn btn-outline-secondary" (click)="copy(slugResult)">Copy</button>
      </div>
    </div>
  </div>
</div>
